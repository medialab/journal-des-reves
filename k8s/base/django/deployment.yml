apiVersion: apps/v1
kind: Deployment
metadata:
  name: django
spec:
  replicas: 1
  selector:
    matchLabels:
      component: django
  template:
    metadata:
      labels:
        component: django
    spec:
      containers:
        - name: django
          image: scpomedialab/journal-des-reves
          imagePullPolicy: Always
          env:
            - name: DATABASE_ENGINE
              value: "django.db.backends.postgresql"
            - name: DATABASE_NAME
              value: "reves"
            - name: DATABASE_USER
              value: "reves"
            - name: DATABASE_PORT
              value: "5432"
            - name: DJANGO_TIME_ZONE
              value: "Europe/Paris"
            - name: DJANGO_LANGUAGE_CODE
              value: "fr-fr"
            - name: TZ
              value: "Europe/Paris"
          volumeMounts:
            - name: reves-media-vol
              mountPath: /app/media
      volumes:
        - name: reves-media-vol
          persistentVolumeClaim:
            claimName: reves-media-pvc

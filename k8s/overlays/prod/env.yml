---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django
spec:
  template:
    spec:
      containers:
        - name: django
          env:
            - name: DJANGO_DEBUG
              value: "false"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DJANGO_SECRET_KEY
            - name: DJANGO_SECURE_HSTS_SECONDS
              value: "31536000"
            - name: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
              value: "true"
            - name: DJANGO_SECURE_HSTS_PRELOAD
              value: "true"
            - name: DJANGO_SECURE_CONTENT_TYPE_NOSNIFF
              value: "true"
            - name: DJANGO_X_FRAME_OPTIONS
              value: "DENY"
            - name: DJANGO_SECURE_REFERRER_POLICY
              value: "strict-origin-when-cross-origin"
            - name: DJANGO_SECURE_CROSS_ORIGIN_OPENER_POLICY
              value: "same-origin"
            - name: DJANGO_ALLOWED_HOSTS
              value: "reves.sciencespo.fr"
            - name: DJANGO_CSRF_TRUSTED_ORIGINS
              value: "http://reves.sciencespo.fr,https://reves.sciencespo.fr"
            - name: DJANGO_CSRF_COOKIE_SECURE
              value: "true"
            - name: DJANGO_SESSION_COOKIE_SECURE
              value: "true"
            - name: DJANGO_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DJANGO_ADMIN_USER
            - name: DJANGO_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DJANGO_ADMIN_EMAIL
            - name: DJANGO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DJANGO_ADMIN_PASSWORD
            - name: DATABASE_HOST
              value: "postgres.journal-des-reves.svc.cluster.local"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: POSTGRES_PASSWORD
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  template:
    spec:
      containers:
        - name: postgres
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: POSTGRES_PASSWORD

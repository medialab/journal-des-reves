apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: journal-des-reves

bases:
  - ../../base/

resources:
  - ingress.yml

patchesStrategicMerge:
  - env.yml

commonLabels:
  stage: prod

secretGenerator:
  - name: secrets
    env: secrets.env

images:
  - name: postgres
    newTag: '16-alpine'
  - name: scpomedialab/journal-des-reves
    newTag: "prod"

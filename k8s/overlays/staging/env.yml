---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django
spec:
  template:
    spec:
      containers:
        - name: django
          env:
            - name: DJANGO_DEBUG
              value: "true"
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DJANGO_SECRET_KEY
            - name: DJANGO_ALLOWED_HOSTS
              value: "reves-pprd.sciencespo.fr"
            - name: DJANGO_CSRF_TRUSTED_ORIGINS
              value: "http://reves-pprd.sciencespo.fr,https://reves-pprd.sciencespo.fr"
            - name: DJANGO_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DJANGO_ADMIN_USER
            - name: DJANGO_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DJANGO_ADMIN_EMAIL
            - name: DJANGO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: DJANGO_ADMIN_PASSWORD
            - name: DATABASE_HOST
              value: "postgres.journal-des-reves-pprd.svc.cluster.local"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: POSTGRES_PASSWORD
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  template:
    spec:
      containers:
        - name: postgres
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secrets
                  key: POSTGRES_PASSWORD

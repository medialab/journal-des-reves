{% extends "polls/base.html" %}

{% block title %}Mot de passe mis à jour – Journal des Rêves{% endblock %}

{% block content %}
<div class="page active">
    <section class="page-hero page-hero-small">
        <div class="container-small journal-hero">
            <span class="journal-kicker">Terminé</span>
            <h1 class="page-title">Mot de passe mis à jour</h1>
            <p class="page-subtitle">Vous pouvez maintenant vous reconnecter avec votre nouveau mot de passe.</p>
        </div>
    </section>

    <section class="page-content">
        <div class="container-small">
            <div class="form-card">
                <div class="form-actions">
                    <a href="{% url 'login' %}" class="btn btn-primary btn-large">Se connecter</a>
                    <a href="{% url 'polls:index' %}" class="btn btn-outline btn-large">Retour à l'accueil</a>
                </div>
            </div>
        </div>
    </section>
</div>
{% endblock %}

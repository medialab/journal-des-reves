version: '3.9'

services:
  # Service Django + Gunicorn (approche microservices simple)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: site_reves_web
    ports:
      # Port Gunicorn
      - "8000:8000"
      # Pour Nginx ou reverse proxy externe sur port 80
      # - "80:80"
    environment:
      # Variables de production - À ADAPTER
      DJANGO_DEBUG: "False"
    volumes:
      # Volumes persistants (données uniquement, pas le code)
      - media_data:/app/media
      - static_data:/app/static
      - logs_data:/app/logs
      # Base de données (si utilisée)
      - ./backend/db.sqlite3:/app/db.sqlite3
    env_file:
      - .env.prod
    restart: unless-stopped
    # Healthcheck simple (ping Gunicorn)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Service de backup (optionnel)
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: site_reves_backup
    command: python manage.py runscript scripts.backup_database --script-args daily
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY}"
    volumes:
      - ./backups:/app/backups
      - ./backend/db.sqlite3:/app/db.sqlite3
    env_file:
      - .env.prod
    # Planifier le backup (ex: tous les jours à minuit)
    # Utiliser cron ou un système externe pour déclencher
    profiles:
      - backup

volumes:
  media_data:
    driver: local
  static_data:
    driver: local
  logs_data:
    driver: local

networks:
  default:
    name: site_reves_network

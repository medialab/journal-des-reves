# Configuration Supervisord pour gérer Gunicorn et Nginx

[supervisord]
nodaemon=true
logfile=/var/log/app/supervisord.log
pidfile=/var/run/supervisord.pid

# Application Django avec Gunicorn
# Configuration pour performance en production avec Nginx comme reverse proxy
[program:gunicorn]
directory=/app
command=gunicorn \
    --workers 4 \
    --worker-class sync \
    --bind 127.0.0.1:8000 \
    --timeout 60 \
    --access-logfile /var/log/app/gunicorn_access.log \
    --error-logfile /var/log/app/gunicorn_error.log \
    --log-level info \
    config.wsgi:application
user=www-data
autostart=true
autorestart=true
startsecs=10
stopwaitsecs=10
stdout_logfile=/var/log/app/gunicorn.log
stderr_logfile=/var/log/app/gunicorn_error.log

# Serveur Web Nginx (reverse proxy)
[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/app/nginx.log
stderr_logfile=/var/log/app/nginx_error.log
user=root

# Configuration du socket supervisord
[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

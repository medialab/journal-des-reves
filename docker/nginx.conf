# Configuration Nginx pour servir l'application Django
upstream django {
    # Connexion vers le serveur Gunicorn/Django
    server 127.0.0.1:8000;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # Domaine: reves-journal.fr
    server_name reves-journal.fr www.reves-journal.fr localhost;
    
    client_max_body_size 50M;
    
    # Logs
    access_log /var/log/app/nginx_access.log;
    error_log /var/log/app/nginx_error.log;
    
    # Redirection automatique HTTP vers HTTPS (à configurer avec certificats SSL)
    # redirect http to https
    # server {
    #     listen 80;
    #     server_name your_domain.com www.your_domain.com;
    #     return 301 https://$server_name$request_uri;
    # }
    
    # Fichiers statiques (CSS, JS, images)
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Fichiers media (uploads utilisateur)
    location /media/ {
        alias /app/media/;
        expires 7d;
    }
    
    # Health check simple
    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Tous les autres chemins vont à Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
